<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheap Grocery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #27ae60;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
            display: inline-block;
            width: 200px;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #27ae60;
        }

        footer {
            background: #2ecc71;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <script src="script.js"></script>

<header>
    <h1>Cheap Grocery</h1>
    <p>Best Prices for Everyday Needs</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <h2>Popular Items</h2>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Rice">
        <h3>Rice</h3>
        <p>₹50 / kg</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Milk">
        <h3>Milk</h3>
        <p>₹30 / liter</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Vegetables">
        <h3>Vegetables</h3>
        <p>₹20 / pack</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Mushroom">
        <h3>Mushroom</h3>
        <p>₹140 / Kg</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
    <img src="https://via.placeholder.com/200" alt="Sugar">
    <h3>Sugar</h3>
    <p>₹40 / kg</p>
    <button class="add-cart">Add to Cart</button>
    </div>

     <div class="product">
    <img src="https://via.placeholder.com/200" alt="Peanut Butter">
    <h3>Peanut Butter</h3>
    <p>208</p>
    <button class="add-cart">Add to Cart</button>
    </div>

    <div class="product">
    <img src="https://via.placeholder.com/200" alt="Oil">
    <h3>Cooking Oil</h3>
    <p>₹120 / liter</p>
    <button class="add-cart">Add to Cart</button>
    </div>

</div>

<footer>
    <p>© 2026 Cheap Grocery | All Rights Reserved</p>
</footer>

</body>
</html>
